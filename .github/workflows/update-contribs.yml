name: Update Contribution Art

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: contribution-art
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVGs
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GH_README_TOKEN: ${{ secrets.GH_README_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python generate_contribs.py --out output

      - name: Commit and sync safely
        run: |
          echo "RUNNING NEW VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/contribs-dark.svg output/contribs-light.svg

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update contribution art"

          # 🔥 SOLUZIONE ROBUSTA: sincronizza PRIMA di push
          git fetch origin main
          git rebase origin/main

          git push origin main